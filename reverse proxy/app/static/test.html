<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VaultCeaser — Test Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--s:#12121a;--s2:#1a1a26;--s3:#252535;--ac:#1abbd6;--ac2:#e06c9f;--t:#e8e8f0;--t2:#8888a0;--ok:#2ecc71;--err:#e74c3c}
body{background:var(--bg);color:var(--t);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--s);border-bottom:1px solid var(--s2);padding:16px 24px;display:flex;align-items:center;gap:14px}
header h1{font-size:1.1rem;font-weight:700;color:var(--ac)}
header span{font-size:0.75rem;color:var(--t2);background:var(--s2);padding:2px 8px;border-radius:10px}
.body{display:grid;grid-template-columns:340px 1fr;flex:1;gap:0}
.sidebar{background:var(--s);border-right:1px solid var(--s2);overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:20px}
.section{display:flex;flex-direction:column;gap:8px}
.section-title{font-size:0.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);margin-bottom:2px}
label{font-size:0.78rem;color:var(--t2);margin-bottom:2px;display:block}
input,select{width:100%;padding:7px 10px;background:var(--s2);border:1px solid var(--s3);border-radius:6px;color:var(--t);font-size:0.82rem;outline:none}
input:focus,select:focus{border-color:var(--ac)}
button{padding:8px 14px;border:none;border-radius:6px;font-size:0.78rem;font-weight:600;cursor:pointer;transition:opacity .15s}
button:hover{opacity:.85}
.btn-primary{background:var(--ac);color:#000}
.btn-sec{background:var(--s3);color:var(--t)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:10px}
.badge.ok{background:#1a3a2a;color:var(--ok)}
.badge.err{background:#3a1a1a;color:var(--err)}
.badge.pending{background:var(--s3);color:var(--t2)}
.api-list{display:flex;flex-direction:column;gap:5px}
.api-item{background:var(--s2);border-radius:6px;overflow:hidden}
.api-item-hd{padding:7px 10px;display:flex;align-items:center;gap:8px;cursor:pointer}
.api-item-hd:hover{background:var(--s3)}
.method{font-size:0.65rem;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.get{background:#1a2a3a;color:#58a6ff}
.api-path{font-size:0.75rem;font-family:monospace;flex:1}
.api-status{margin-left:auto;flex-shrink:0}
.main-area{display:flex;flex-direction:column;flex:1;overflow:hidden}
.tabs{display:flex;background:var(--s);border-bottom:1px solid var(--s2)}
.tab{padding:10px 18px;font-size:0.78rem;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.tab-content{flex:1;overflow:hidden;display:none;flex-direction:column}
.tab-content.active{display:flex}
#tabPlayer{position:relative;background:#000;flex:1}
#playerFrame{width:100%;height:100%;border:none;display:none}
#playerPlaceholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--t2)}
#playerPlaceholder svg{width:48px;height:48px;margin-bottom:10px;opacity:.3}
#tabResponse{flex:1;display:flex;flex-direction:column;overflow:hidden}
.res-bar{padding:9px 14px;background:var(--s);border-bottom:1px solid var(--s2);font-size:0.75rem;color:var(--t2);display:flex;align-items:center;gap:10px}
pre{flex:1;overflow:auto;padding:16px;font-family:monospace;font-size:0.78rem;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.health-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px}
.health-card{background:var(--s2);border-radius:8px;padding:12px}
.health-card .name{font-size:0.72rem;font-weight:600;color:var(--t2);margin-bottom:6px}
.health-card .val{font-size:0.88rem;font-weight:600}
.ok-text{color:var(--ok)}.err-text{color:var(--err)}
</style>
</head>
<body>
<header>
  <h1>VaultCeaser</h1>
  <span>API Test Panel</span>
  <span id="serverBadge" class="badge pending">checking...</span>
  <a href="/docs" target="_blank" style="margin-left:auto;color:var(--ac);font-size:0.78rem;text-decoration:none">FastAPI Docs ↗</a>
</header>

<div class="body">
  <div class="sidebar">

    <!-- ── Stream Tester ── -->
    <div class="section">
      <div class="section-title">Stream Tester</div>
      <div>
        <label>MAL ID</label>
        <input id="stMalId" type="number" value="21" placeholder="e.g. 21 = One Piece">
      </div>
      <div>
        <label>Episode</label>
        <input id="stEp" type="number" value="1" min="1">
      </div>
      <div>
        <label>Category</label>
        <select id="stCat">
          <option value="sub">SUB</option>
          <option value="dub">DUB</option>
          <option value="ssub">SSUB</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="loadPlayer()">▶ Play iframe</button>
        <button class="btn-sec" onclick="openWatch()">Watch Page</button>
      </div>
    </div>

    <!-- ── API Tester ── -->
    <div class="section">
      <div class="section-title">API Tester</div>
      <div>
        <label>MAL ID (for anime endpoints)</label>
        <input id="apiMalId" type="number" value="21">
      </div>
      <div>
        <label>Search Query</label>
        <input id="apiQuery" type="text" value="one piece">
      </div>
      <div class="api-list" id="apiList"></div>
    </div>

    <!-- ── Health ── -->
    <div class="section">
      <div class="section-title">Health</div>
      <button class="btn-sec" onclick="checkHealth()">Run health check</button>
      <div id="healthOut" style="font-size:0.75rem;color:var(--t2);margin-top:4px"></div>
    </div>

  </div>

  <div class="main-area">
    <div class="tabs">
      <div class="tab active" data-tab="player" onclick="switchTab(this)">Player</div>
      <div class="tab" data-tab="response" onclick="switchTab(this)">Response</div>
    </div>

    <div class="tab-content active" id="tabPlayer">
      <div id="playerPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          <path d="M15.5 12l-5-3v6l5-3z"/>
        </svg>
        <div>Fill in MAL ID + episode and click Play</div>
      </div>
      <iframe id="playerFrame" title="Stream"
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox">
      </iframe>
    </div>

    <div class="tab-content" id="tabResponse">
      <div class="res-bar">
        <span id="resMethod" style="font-weight:700"></span>
        <span id="resUrl" style="font-family:monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        <span id="resStatus"></span>
        <span id="resDur"></span>
      </div>
      <pre id="resBody">Hit an API endpoint to see the response.</pre>
    </div>
  </div>
</div>

<script>
const BASE = '';

const ENDPOINTS = [
  {method:'GET', path:'/api/health',         label:'Health',              fn: ()=>`/api/health`},
  {method:'GET', path:'/api/genres',          label:'Genres',              fn: ()=>`/api/genres`},
  {method:'GET', path:'/api/search',          label:'Search',              fn: ()=>`/api/search?q=${encodeURIComponent(q())}`},
  {method:'GET', path:'/api/suggestions',     label:'Suggestions',         fn: ()=>`/api/suggestions?q=${encodeURIComponent(q())}`},
  {method:'GET', path:'/api/trending',        label:'Trending',            fn: ()=>`/api/trending`},
  {method:'GET', path:'/api/popular',         label:'Popular',             fn: ()=>`/api/popular`},
  {method:'GET', path:'/api/upcoming',        label:'Upcoming',            fn: ()=>`/api/upcoming`},
  {method:'GET', path:'/api/schedule',        label:'Schedule',            fn: ()=>`/api/schedule`},
  {method:'GET', path:'/api/spotlight',       label:'Spotlight',           fn: ()=>`/api/spotlight`},
  {method:'GET', path:'/api/homepage',        label:'Homepage',            fn: ()=>`/api/homepage`},
  {method:'GET', path:'/api/anime/:mal_id',   label:'Anime Info',          fn: ()=>`/api/anime/${mid()}`},
  {method:'GET', path:'/api/anime/:mal_id/episodes', label:'Episodes',     fn: ()=>`/api/anime/${mid()}/episodes`},
  {method:'GET', path:'/api/anime/:mal_id/characters', label:'Characters', fn: ()=>`/api/anime/${mid()}/characters`},
  {method:'GET', path:'/api/anime/:mal_id/relations', label:'Relations',   fn: ()=>`/api/anime/${mid()}/relations`},
  {method:'GET', path:'/api/anime/:mal_id/recommendations', label:'Recs',  fn: ()=>`/api/anime/${mid()}/recommendations`},
  {method:'GET', path:'/api/stream/iframe',   label:'Stream Iframe URL',   fn: ()=>`/api/stream/iframe?episode_id=mal:${mid()}:1&cat=sub`},
];

function q(){return document.getElementById('apiQuery').value||'one piece'}
function mid(){return document.getElementById('apiMalId').value||'21'}

function buildApiList(){
  const list = document.getElementById('apiList');
  list.innerHTML = ENDPOINTS.map((e,i)=>`
    <div class="api-item">
      <div class="api-item-hd" onclick="callApi(${i})">
        <span class="method get">${e.method}</span>
        <span class="api-path">${e.label}</span>
        <span class="api-status" id="st_${i}"><span class="badge pending">—</span></span>
      </div>
    </div>`).join('');
}

async function callApi(i){
  const e = ENDPOINTS[i];
  const url = BASE + e.fn();
  const st = document.getElementById(`st_${i}`);
  st.innerHTML = `<span class="badge pending">...</span>`;
  switchTabById('response');
  document.getElementById('resMethod').textContent = e.method;
  document.getElementById('resUrl').textContent = url;
  document.getElementById('resStatus').textContent = '';
  document.getElementById('resDur').textContent = '';
  document.getElementById('resBody').textContent = 'Loading…';
  const t0 = performance.now();
  try{
    const r = await fetch(url);
    const dur = (performance.now()-t0).toFixed(0);
    const ok = r.ok;
    st.innerHTML = `<span class="badge ${ok?'ok':'err'}">${r.status}</span>`;
    document.getElementById('resStatus').innerHTML = `<span class="badge ${ok?'ok':'err'}">${r.status}</span>`;
    document.getElementById('resDur').textContent = `${dur}ms`;
    const ct = r.headers.get('content-type')||'';
    let body;
    if(ct.includes('json')){
      body = JSON.stringify(await r.json(), null, 2);
    } else {
      body = await r.text();
    }
    document.getElementById('resBody').textContent = body;
  }catch(err){
    st.innerHTML = `<span class="badge err">ERR</span>`;
    document.getElementById('resBody').textContent = String(err);
  }
}

function loadPlayer(){
  const malId = document.getElementById('stMalId').value||'21';
  const ep    = document.getElementById('stEp').value||'1';
  const cat   = document.getElementById('stCat').value;
  const src   = `/api/mp/stream/mal/${malId}/${ep}/${cat}`;
  document.getElementById('playerPlaceholder').style.display='none';
  const f = document.getElementById('playerFrame');
  f.src = src;
  f.style.display = 'block';
  switchTabById('player');
}

function openWatch(){
  const malId = document.getElementById('stMalId').value||'21';
  window.open(`/watch/${malId}`, '_blank');
}

async function checkHealth(){
  const out = document.getElementById('healthOut');
  out.textContent = 'Checking…';
  try{
    const r = await fetch('/api/health');
    const d = await r.json();
    out.innerHTML = Object.entries(d).map(([k,v])=>`<div><b>${k}</b>: <span class="${v==='ok'||v===true?'ok-text':'err-text'}">${JSON.stringify(v)}</span></div>`).join('');
  }catch(e){
    out.textContent = 'Error: '+e;
  }
}

async function checkServer(){
  try{
    const r = await fetch('/health');
    const ok = r.ok;
    const badge = document.getElementById('serverBadge');
    badge.className = `badge ${ok?'ok':'err'}`;
    badge.textContent = ok ? 'server online' : `server ${r.status}`;
  }catch{
    const badge = document.getElementById('serverBadge');
    badge.className = 'badge err';
    badge.textContent = 'offline';
  }
}

function switchTab(el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab'+el.dataset.tab.charAt(0).toUpperCase()+el.dataset.tab.slice(1)).classList.add('active');
}
function switchTabById(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===id));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.toggle('active', t.id==='tab'+id.charAt(0).toUpperCase()+id.slice(1)));
}

buildApiList();
checkServer();
</script>
</body>
</html>
